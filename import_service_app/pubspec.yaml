  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.1.0
  dio: ^5.9.2
  shared_preferences: ^2.5.4
  equatable: ^2.0.8
  dartz: ^0.10.1
  flutter_easylogger: ^2.3.3
