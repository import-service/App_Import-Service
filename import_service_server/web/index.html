<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Импорт Сервис — админка</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      background: #1e293b;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: 1.35rem; color: #f8fafc; }
    p { margin: 0 0 16px; line-height: 1.5; color: #94a3b8; font-size: 0.95rem; }
    code { background: #334155; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }
    a { color: #60a5fa; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Веб-админка</h1>
    <p>Заглушка. Сюда кладётся Flutter Web после <code>flutter build web --base-href=/admin/</code>.</p>
    <p><a href="/docs">Документация API</a> · <a href="/api/health">/api/health</a></p>
  </main>
</body>
</html>
